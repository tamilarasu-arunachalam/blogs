<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  <meta name="description" content="{{ page.meta_description | default: site.description }}">
  <meta name="keywords" content="{{ page.meta_keywords | join: ', ' | default: site.keywords }}">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">

  <!-- JSON-LD for Search Engine Optimization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "{{ site.url }}",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ site.url }}/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
</head>

<body class="d-flex flex-column min-vh-100">
  {% include navbar.html %}

  <main id="main">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    // Logic to handle mobile menu backdrop and body lock
    document.addEventListener('DOMContentLoaded', function() {
      const myCollapse = document.getElementById('navbarNav');
      if (myCollapse) {
        myCollapse.addEventListener('show.bs.collapse', function () {
          document.body.classList.add('show-nav');
        })
        myCollapse.addEventListener('hide.bs.collapse', function () {
          document.body.classList.remove('show-nav');
        })
        
        // Close menu on link click
        const navLinks = myCollapse.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
          link.addEventListener('click', () => {
            const bsCollapse = bootstrap.Collapse.getInstance(myCollapse);
            if (bsCollapse) bsCollapse.hide();
          });
        });
      }
    });
  </script>
</body>

</html>
