<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ site.baseurl }}/assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="{{ site.baseurl }}/assets/favicon/site.webmanifest">
  {% seo %}
  <!-- keywords -->
  <meta name="keywords" content="{{ page.meta_keywords | default: "Tamilarasu, Tamilarasu Arunachalam, Tamilarasu Power Platform, Tamilarasu Arunachalam Developer, Tamilarasu chrome extensions, Tamilarasu blogs, Power Platform blogs, Dynamics 365 blogs" }}">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Fonts Preconnect & Preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rock+Salt&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rock+Salt&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rock+Salt&display=swap"
      rel="stylesheet">
  </noscript>
  <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.7.0/styles/default.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlightjs-themes@1.0.0/googlecode.css"
    integrity="sha256-DoctU8+u7lhnY4WC+WLLESh25ZJ4Kob/YISlLjheF70=" crossorigin="anonymous">
  
  <!-- Custom CSS -->
  <link rel="preload" as="style" href="{{ site.baseurl }}/assets/css/style.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  
  <!-- Google tag (gtag.js) -->
  <script async='async' src='https://www.googletagmanager.com/gtag/js?id=G-NRDWJ8N6VV' />
  <script defer='defer'>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-NRDWJ8N6VV");
  </script>
  <!-- Google tag (gtag.js) -->
</head>

<body class="d-flex flex-column min-vh-100">
  {% include navbar.html %}

  <main id="main">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

  <script>
    // Logic to handle mobile menu backdrop and body lock
    document.addEventListener('DOMContentLoaded', function () {
      const myCollapse = document.getElementById('navbarNav');
      if (myCollapse) {
        myCollapse.addEventListener('show.bs.collapse', function () {
          document.body.classList.add('show-nav');
        })
        myCollapse.addEventListener('hide.bs.collapse', function () {
          document.body.classList.remove('show-nav');
        })

        // Close menu on link click
        const navLinks = myCollapse.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
          link.addEventListener('click', () => {
            const bsCollapse = bootstrap.Collapse.getInstance(myCollapse);
            if (bsCollapse) bsCollapse.hide();
          });
        });
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>
  <!-- Initialize highlighting -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // 1. Highlight all code syntax first
      hljs.highlightAll();

      // 2. Manually inject line numbers on every code element safely
      if (typeof hljs.lineNumbersBlock === 'function') {
        document.querySelectorAll('code').forEach((element) => {
          hljs.lineNumbersBlock(element);
        });
      }
    });
  </script>
</body>

</html>
