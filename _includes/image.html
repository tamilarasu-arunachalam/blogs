<!-- Premium Image Handler with Placeholder Fallback -->
{% assign img_url = include.url %}
{% assign img_alt = include.alt %}
{% assign img_class = include.class %}
{% assign img_style = include.style %}

{% if img_url and img_url != "" %}
    <img src="{{ img_url | relative_url }}" alt="{{ img_alt }}" class="{{ img_class }}" style="{{ img_style }}">
{% else %}
    <div class="{{ img_class }} img-placeholder shadow-inner" style="{{ img_style }}">
        <!-- Displayed via CSS ::after -->
    </div>
{% endif %}
