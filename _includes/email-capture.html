<!-- Email Capture Include -->
<div id="subscribe" class="email-capture-box bg-white p-4 border rounded shadow-sm">
    <h6 class="text-dark fw-bold mb-3">Stay Updated</h6>
    <p class="small text-muted mb-4">Join 2,000+ subscribers for weekly tech insights sent directly to your inbox.</p>
    <form action="#" method="post" id="newsletter-form">
        <div class="input-group mb-3">
            <input type="email" name="EMAIL" class="form-control rounded-pill rounded-end-0 border-end-0 px-3" placeholder="email@example.com" aria-label="Email address" required>
            <button class="btn btn-dark rounded-pill rounded-start-0 px-3" type="submit">Join Now</button>
        </div>
    </form>
</div>
