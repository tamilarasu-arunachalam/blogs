<!-- Affiliate Table Include -->
<div class="affiliate-comparison table-responsive mt-5 mb-5 shadow-sm rounded-4 overflow-hidden border">
    <table class="table table-hover align-middle m-0">
        <thead class="bg-light">
            <tr>
                <th class="ps-4 py-3">Product</th>
                <th class="py-3">Features</th>
                <th class="py-3">Best for</th>
                <th class="text-center py-3 pe-4">Price / Link</th>
            </tr>
        </thead>
        <tbody>
            {% for item in include.items %}
            <tr>
                <td class="ps-4">
                    <div class="d-flex align-items-center">
                        <img src="{{ item.image }}" alt="{{ item.name }}" class="rounded me-3" width="60" height="60" style="object-fit: cover;">
                        <span class="fw-bold">{{ item.name }}</span>
                    </div>
                </td>
                <td>{{ item.features }}</td>
                <td><span class="badge bg-light text-dark border">{{ item.best_for }}</span></td>
                <td class="text-center pe-4">
                    <a href="{{ item.link }}" target="_blank" rel="nofollow noopener" class="btn btn-dark btn-sm rounded-pill px-4">Check Price</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
