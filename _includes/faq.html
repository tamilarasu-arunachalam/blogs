<!-- Optional FAQ Component -->
{% if page.faq %}
<section class="post-faq mt-5 pt-5 border-top">
    <div class="row justify-content-center">
        <div class="col-lg-12">
            <h3 class="fw-bold mb-4">Frequently Asked Questions</h3>
            <div class="accordion accordion-flush bg-white rounded-4 overflow-hidden border shadow-sm" id="postAccordion">
                {% for item in page.faq %}
                <div class="accordion-item">
                    <h2 class="accordion-header" id="heading{{ forloop.index }}">
                        <button class="accordion-button collapsed py-3 px-4 fw-bold text-dark" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ forloop.index }}" aria-expanded="false" aria-controls="collapse{{ forloop.index }}">
                            {{ item.question }}
                        </button>
                    </h2>
                    <div id="collapse{{ forloop.index }}" class="accordion-collapse collapse" aria-labelledby="heading{{ forloop.index }}" data-bs-parent="#postAccordion">
                        <div class="accordion-body py-3 px-4 text-secondary">
                            {{ item.answer }}
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
{% endif %}
