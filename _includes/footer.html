<!-- Minimalist Footer with Newsletter -->
<footer class="mt-auto py-5 bg-white border-top">
    <div class="container">
        <div class="row align-items-center mb-5">
            <div class="col-lg-6 text-center text-lg-start mb-4 mb-lg-0">
                <h5 class="fw-bold mb-1">Stay Updated</h5>
                <p class="small text-secondary mb-0">Join 2,000+ others for weekly tech & productivity insights.</p>
            </div>
            <div class="col-lg-6">
                <form action="#" method="post" class="footer-newsletter">
                    <div class="input-group">
                        <input type="email" class="form-control border-2 bg-light-subtle rounded-3 me-2" placeholder="your@email.com" required>
                        <button class="btn btn-dark fw-bold px-4 rounded-3" type="submit">Join Now</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="pt-4 border-top text-center">
            <div class="small text-secondary opacity-75">
                &copy; {{ site.time | date: '%Y' }} {{ site.author }}. All rights reserved.
            </div>
        </div>
    </div>
</footer>
